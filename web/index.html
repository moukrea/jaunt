<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c0c0e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Jaunt</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0c0c0e;
      color: #c8c5bd;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-feature-settings: 'kern' 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }
    #app { min-height: 100dvh; display: flex; flex-direction: column; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a42; }

    /* Smooth page transitions */
    .view-enter { animation: viewIn 0.28s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes viewIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stagger children */
    .stagger > * { animation: staggerIn 0.32s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .stagger > *:nth-child(1) { animation-delay: 0.03s; }
    .stagger > *:nth-child(2) { animation-delay: 0.06s; }
    .stagger > *:nth-child(3) { animation-delay: 0.09s; }
    .stagger > *:nth-child(4) { animation-delay: 0.12s; }
    .stagger > *:nth-child(5) { animation-delay: 0.15s; }
    .stagger > *:nth-child(6) { animation-delay: 0.18s; }
    .stagger > *:nth-child(7) { animation-delay: 0.21s; }
    .stagger > *:nth-child(8) { animation-delay: 0.24s; }
    @keyframes staggerIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Pulse for live indicator */
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .pulse { animation: livePulse 2s ease-in-out infinite; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #2a2a30;
      border-top-color: #e8a245;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Noise texture overlay */
    .noise::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.018;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      z-index: 9999;
    }
  </style>
</head>
<body class="noise">
  <div id="app"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
