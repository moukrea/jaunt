name: Web Client

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout cairn (local dependency)
        uses: actions/checkout@v4
        with:
          repository: moukrea/cairn
          path: cairn

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build cairn-p2p
        working-directory: cairn/packages/ts/cairn-p2p
        run: npm ci && npm run build

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Build web client
        working-directory: web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
