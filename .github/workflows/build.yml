name: Build

on:
  workflow_call:
    inputs:
      upload-artifacts:
        type: boolean
        default: false
      create-archives:
        type: boolean
        default: false
      ref-name:
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            os_name: linux
            arch: x86_64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            os_name: linux
            arch: aarch64
            cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation packages
        if: matrix.cross
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Verify binaries
        run: |
          test -f target/${{ matrix.target }}/release/jaunt-host
          test -f target/${{ matrix.target }}/release/jaunt-client

      - name: Create archives
        if: inputs.create-archives
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/jaunt-host dist/
          cp target/${{ matrix.target }}/release/jaunt-client dist/
          cd dist && tar czf jaunt-${{ inputs.ref-name }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz jaunt-host jaunt-client

      - name: Generate checksum
        if: inputs.create-archives
        run: |
          cd dist && sha256sum jaunt-${{ inputs.ref-name }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz \
            > jaunt-${{ inputs.ref-name }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz.sha256

      - name: Build .deb package
        if: inputs.create-archives
        run: |
          cargo install cargo-deb
          cargo deb --no-build --target ${{ matrix.target }} -p jaunt-host
          mkdir -p dist
          mv target/${{ matrix.target }}/debian/jaunt-host_*.deb \
            dist/jaunt-${{ inputs.ref-name }}-linux-${{ matrix.arch }}.deb

      - name: Build .rpm package
        if: inputs.create-archives
        run: |
          cargo install cargo-generate-rpm
          cargo generate-rpm --target ${{ matrix.target }} -p crates/jaunt-host
          mv target/${{ matrix.target }}/generate-rpm/jaunt-host-*.rpm \
            dist/jaunt-${{ inputs.ref-name }}-linux-${{ matrix.arch }}.rpm

      - name: Upload artifact
        if: inputs.upload-artifacts && !inputs.create-archives
        uses: actions/upload-artifact@v4
        with:
          name: jaunt-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/jaunt-host
            target/${{ matrix.target }}/release/jaunt-client

      - name: Upload release artifact
        if: inputs.upload-artifacts && inputs.create-archives
        uses: actions/upload-artifact@v4
        with:
          name: jaunt-${{ matrix.target }}
          path: |
            dist/jaunt-${{ inputs.ref-name }}-*
